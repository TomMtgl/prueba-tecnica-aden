version: '3.8'

services:
  api:
    build: .
    container_name: university-api
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - DATABASE_URL=postgresql+psycopg://postgres:postgres@db:5432/university
      - SECRET_KEY=dev-secret-key-change-in-production
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
      - APP_NAME=University API
      - APP_VERSION=1.0.0
      - DEBUG=True
    depends_on:
      db:
        condition: service_healthy
    networks:
      - university-network

  db:
    image: postgres:15-alpine
    container_name: university-db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=university
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - university-network

volumes:
  postgres_data:

networks:
  university-network:
    driver: bridge